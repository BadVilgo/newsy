name: Daily refresh

# Codzienne odświeżanie newsów. Robota dzieje się TU (na runnerze GitHuba),
# nie na Vercelu — dzięki temu nie obowiązuje limit 60 s funkcji serverless.
on:
  schedule:
    # 3 próby co 20 min (03:18 / 03:38 / 03:58 UTC). Skrypt pomija boxy już świeże,
    # więc kolejne przebiegi ponawiają tylko te, które padły (np. na 503 od Gemini).
    # UWAGA: GitHub Actions używa strefy UTC i nie ogarnia czasu letniego/zimowego.
    # 03:18 UTC = 05:18 PL latem (CEST), 04:18 PL zimą (CET).
    # Minuta :18 (nie :00) celowo — omija tłok schedulera GitHuba na pełnej godzinie.
    - cron: '18,38,58 3 * * *'
  workflow_dispatch: {} # przycisk "Run workflow" do ręcznego odpalenia/testów (wymusza pełne odświeżenie)

# Gdyby przebieg się przeciągał, nie pozwól mu wisieć w nieskończoność.
concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Odśwież newsy
        run: npx tsx scripts/refresh.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Ręczne uruchomienie odświeża wszystko; harmonogram tylko boxy nieświeże.
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' }}
